version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # HOW TO ADD A NEW ENV VAR:
        # 1. Add it in Amplify Console → App settings → Environment variables
        # 2. Add a line below: echo "APP_VAR_NAME=$CONSOLE_VAR_NAME" >> .env.production.local
        # 3. Commit + push — Amplify redeploys and the var becomes available
        # NOTE: Amplify silently filters vars prefixed with NEXT_ during build.
        #       If a NEXT_ var is missing, source its value from a non-NEXT_ var instead.
        - rm -f .env.production.local
        - echo "DATABASE_URL=$DATABASE_URL" >> .env.production.local
        - echo "NEXTAUTH_SECRET=$AUTH_SECRET" >> .env.production.local
        - echo "AUTH_SECRET=$AUTH_SECRET" >> .env.production.local
        - echo "AUTH_TRUST_HOST=1" >> .env.production.local
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env.production.local
        - echo "AWS_BUCKET_NAME=$BUCKET_NAME" >> .env.production.local
        - echo "AWS_REGION=$REGION" >> .env.production.local
        - echo "AWS_ACCESS_KEY_ID=$ACCESS_KEY_ID" >> .env.production.local
        - echo "AWS_SECRET_ACCESS_KEY=$SECRET_ACCESS_KEY" >> .env.production.local
        - echo "OTP_DEV_CODE=$OTP_DEV_CODE" >> .env.production.local
        - echo "MSG91_API_KEY=$MSG91_API_KEY" >> .env.production.local
        - echo "MSG91_TEMPLATE_ID=$MSG91_TEMPLATE_ID" >> .env.production.local
        - echo "MSG91_SENDER_ID=$MSG91_SENDER_ID" >> .env.production.local
        - echo "UPSTASH_REDIS_REST_URL=$UPSTASH_REDIS_REST_URL" >> .env.production.local
        - echo "UPSTASH_REDIS_REST_TOKEN=$UPSTASH_REDIS_REST_TOKEN" >> .env.production.local
        - npx prisma migrate deploy
        - npx prisma generate
        - npm run build
        - cp .env.production.local .next/.env.production.local
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
