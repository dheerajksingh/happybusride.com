<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HappyBusRide — Wireframes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#e8e8e8;display:flex;height:100vh;overflow:hidden}
#sidebar{width:240px;min-width:240px;background:#1e1e2e;color:#cdd6f4;display:flex;flex-direction:column;overflow:hidden}
#sidebar h1{padding:16px;font-size:13px;font-weight:700;letter-spacing:.5px;color:#89b4fa;border-bottom:1px solid #313244;flex-shrink:0}
#sidebar nav{overflow-y:auto;flex:1;padding:8px 0}
.group-label{padding:8px 14px 4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6c7086}
.screen-btn{display:block;width:100%;text-align:left;padding:6px 14px;font-size:12px;color:#bac2de;background:none;border:none;cursor:pointer;border-left:3px solid transparent;transition:all .1s}
.screen-btn:hover{background:#313244;color:#cdd6f4}
.screen-btn.active{background:#313244;border-left-color:#89b4fa;color:#89b4fa}
#canvas{flex:1;overflow:auto;padding:32px;display:flex;flex-direction:column;align-items:center}
.device{width:390px;min-height:700px;background:#fff;border-radius:16px;box-shadow:0 4px 40px rgba(0,0,0,.18);overflow:hidden;position:relative}
.device.desktop{width:900px;min-height:600px}
.screen-label{font-size:11px;color:#666;margin-bottom:10px;text-align:center;letter-spacing:.5px;text-transform:uppercase}

/* Wireframe primitives */
.wf-bar{background:#f0f0f0;border-bottom:1px solid #ddd}
.wf-hero{background:#c7d2fe;display:flex;align-items:center;justify-content:center;color:#4338ca;font-weight:600;font-size:13px}
.wf-box{background:#e5e7eb;border:1px solid #d1d5db;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:11px;font-weight:500}
.wf-btn{background:#374151;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:600;cursor:default;display:inline-block}
.wf-btn.outline{background:#fff;color:#374151;border:1.5px solid #9ca3af}
.wf-btn.primary{background:#2563eb}
.wf-btn.amber{background:#d97706}
.wf-btn.green{background:#16a34a}
.wf-btn.red{background:#dc2626}
.wf-btn.violet{background:#7c3aed}
.wf-input{border:1.5px solid #d1d5db;border-radius:6px;padding:8px 10px;font-size:12px;color:#9ca3af;background:#f9fafb;width:100%}
.wf-tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600}
.wf-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px}
.wf-divider{height:1px;background:#f3f4f6;margin:8px 0}
.wf-avatar{width:36px;height:36px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1d4ed8;flex-shrink:0}
.wf-stat{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px 14px}
.wf-table{width:100%;border-collapse:collapse;font-size:11px}
.wf-table th{background:#f3f4f6;padding:6px 10px;text-align:left;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb}
.wf-table td{padding:7px 10px;border-bottom:1px solid #f3f4f6;color:#374151}
.wf-table tr:last-child td{border-bottom:none}
.wf-seat{width:28px;height:28px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;margin:2px}
.wf-seat.av{background:#dcfce7;border:1px solid #86efac;color:#16a34a}
.wf-seat.bk{background:#fee2e2;border:1px solid #fca5a5;color:#dc2626}
.wf-seat.sel{background:#dbeafe;border:1px solid #93c5fd;color:#1d4ed8}
.wf-nav-bottom{display:flex;border-top:1px solid #e5e7eb;background:#fff}
.wf-nav-item{flex:1;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:#9ca3af;cursor:default}
.wf-nav-item.active{color:#2563eb}
.wf-step{display:flex;align-items:center;gap:6px;font-size:11px}
.wf-step-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.wf-step-dot.done{background:#16a34a;color:#fff}
.wf-step-dot.active{background:#2563eb;color:#fff}
.wf-step-dot.todo{background:#e5e7eb;color:#9ca3af}
.wf-map{background:linear-gradient(135deg,#e0f2fe 0%,#bae6fd 100%);border:1px solid #7dd3fc;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#0369a1;font-size:11px;font-weight:600}
.wf-sidebar-layout{display:flex;height:100%}
.wf-side-nav{width:180px;border-right:1px solid #e5e7eb;background:#f9fafb;padding:12px 0;flex-shrink:0}
.wf-side-item{padding:7px 14px;font-size:11px;color:#6b7280;cursor:default;border-left:3px solid transparent}
.wf-side-item.active{color:#2563eb;border-left-color:#2563eb;background:#eff6ff;font-weight:600}
.wf-main-content{flex:1;overflow:auto;padding:16px}
p.hint{color:#9ca3af;font-size:10px;margin-top:2px}
</style>
</head>
<body>

<div id="sidebar">
  <h1>HappyBusRide Wireframes</h1>
  <nav id="nav"></nav>
</div>

<div id="canvas">
  <div class="screen-label" id="screen-label"></div>
  <div id="screen-host"></div>
</div>

// Build sidebar nav
const GROUPS = [
  {label:"Passenger", keys:["Landing","PassengerSearch","PassengerSeatSelect","PassengerBookingReview","PassengerPayment","PassengerSuccess","PassengerMyTrips","PassengerTracking","PassengerCharter","PassengerWallet"]},
  {label:"Auth", keys:["AuthLogin","AuthOTP","AuthOperatorLogin"]},
  {label:"Operator", keys:["OperatorDashboard","OperatorOnboarding","OperatorRoutes","OperatorSchedules","OperatorBuses","OperatorEarnings"]},
  {label:"Driver", keys:["DriverDashboard","DriverTripDetail","DriverScan"]},
  {label:"Admin", keys:["AdminDashboard","AdminOperators","AdminBookings","AdminAnalytics","AdminDisputes","AdminRefunds"]},
];

const nav = document.getElementById("nav");
GROUPS.forEach(g => {
  const gl = document.createElement("div");
  gl.className = "group-label";
  gl.textContent = g.label;
  nav.appendChild(gl);
  g.keys.forEach(k => {
    const s = SCREENS[k];
    if (!s) return;
    const btn = document.createElement("button");
    btn.className = "screen-btn";
    btn.dataset.key = k;
    btn.textContent = s.label;
    btn.onclick = () => showScreen(k);
    nav.appendChild(btn);
  });
});

function showScreen(key) {
  const s = SCREENS[key];
  if (!s) return;
  document.querySelectorAll(".screen-btn").forEach(b => b.classList.toggle("active", b.dataset.key === key));
  document.getElementById("screen-label").textContent = s.label;
  const host = document.getElementById("screen-host");
  const isMobile = s.mobile !== false;
  host.innerHTML = `<div class="device ${isMobile ? "" : "desktop"}">${s.html()}</div>`;
}

// Show first screen on load
showScreen("Landing");
